# kajota-hub — single Standard (2 GB) Render service hosting six apps behind
# Caddy. Deploy: connect this repo, point Render at this render.yaml.
#
# Env vars are NAMESPACED per app so services that share generic names
# (MONGODB_URI, GEMINI_MODEL, MESH_*) don't clobber each other:
#   COKX_*  -> coach-okx      CONC_* -> concierge    SLK_* -> slack
#   MOKX_*  -> mesh-okx       MSKL_* -> mesh-skill    (witness: unprefixed)
# The per-app wrapper in scripts/run/ strips the prefix before launch.
#
# Secrets (sync: false) are entered in the Render dashboard. GCP service
# account JSON goes in as a Secret File; point the *_GOOGLE_APPLICATION_
# CREDENTIALS var at its mount path (e.g. /etc/secrets/gcp-service-account.json).
services:
  - type: web
    name: kajota-hub
    runtime: docker
    plan: standard          # 2 GB / 1 CPU — six processes need the headroom
    region: oregon
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      # ---- coach-okx (OKX.AI Genesis ASP) ----------------------------
      - { key: COKX_GEMINI_MODEL, value: gemini-2.5-pro }
      - { key: COKX_GCP_PROJECT_ID, sync: false }
      - { key: COKX_GCP_REGION, value: us-central1 }
      - { key: COKX_GOOGLE_APPLICATION_CREDENTIALS, value: /etc/secrets/gcp-service-account.json }
      - { key: COKX_GOOGLE_GENAI_USE_VERTEXAI, value: "true" }
      - { key: COKX_GOOGLE_CLOUD_LOCATION, value: global }
      - { key: COKX_PARTNER, value: mongodb }
      - { key: COKX_MONGODB_URI, sync: false }
      # XLayer mainnet (chain 196) — chain 195 isn't indexed by OKX's
      # payment backend (verified via `onchainos payment pay` returning
      # `chain not found for realChainIndex 195`). 196 matches where
      # ASP 5855 lives on-chain.
      - { key: COKX_X402_NETWORK, value: "eip155:196" }
      - { key: COKX_X402_MAX_AMOUNT, value: "10000" }
      - { key: COKX_X402_PAY_TO, sync: false }              # 0x7876c479f68b7f218ca59a4b8c860a4a06350007 (ASP 5855 wallet)
      - { key: COKX_X402_ASSET, sync: false }               # 0x1e4a5963abfd975d8c9021ce480b42188849d41d (XLayer mainnet USDT)
      - { key: COKX_X402_ASSET_NAME, value: Tether USD }
      - { key: COKX_X402_ASSET_DECIMALS, value: "6" }
      - { key: COKX_X402_ASSET_VERSION, value: "1" }
      - { key: COKX_X402_VERSION, value: "1" }
      - { key: COKX_X402_FACILITATOR_URL, sync: false }     # leave blank until a real EVM facilitator (Coinbase CDP / self-hosted `coinbase/x402`) is wired
      - { key: COKX_X402_FACILITATOR_API_KEY, sync: false }
      - { key: COKX_COACH_BACKEND_URL, sync: false }

      # ---- mesh-okx (XLayer escrow) ----------------------------------
      # XLayer mainnet — matches Coach's ASP chain (196).
      - { key: MOKX_MESH_RPC_URL, value: https://rpc.xlayer.tech }
      - { key: MOKX_MESH_CHAIN_ID, value: "196" }
      - { key: MOKX_MESH_DRY_RUN, value: "false" }
      - { key: MOKX_MESH_RELEASE_AUTH_KEY, sync: false }
      - { key: MOKX_MESH_ESCROW_ADDR, sync: false }
      - { key: MOKX_MESH_REGISTRY_ADDR, sync: false }
      - { key: MOKX_MESH_USDC_ADDR, sync: false }

      # ---- concierge (rapid-agent) -----------------------------------
      - { key: CONC_GEMINI_MODEL, value: gemini-2.5-pro }
      - { key: CONC_GCP_PROJECT_ID, sync: false }
      - { key: CONC_GCP_REGION, value: us-central1 }
      - { key: CONC_GOOGLE_APPLICATION_CREDENTIALS, value: /etc/secrets/gcp-service-account.json }
      - { key: CONC_GOOGLE_GENAI_USE_VERTEXAI, value: "true" }
      - { key: CONC_GOOGLE_CLOUD_LOCATION, value: global }
      - { key: CONC_PARTNER, value: mongodb }
      - { key: CONC_MONGODB_URI, sync: false }
      # concierge (rapid-agent) settles x402 on Casper testnet
      - { key: CONC_X402_FACILITATOR_URL, value: https://x402-facilitator.cspr.cloud }
      - { key: CONC_X402_NETWORK, value: "casper:casper-test" }
      - { key: CONC_X402_MAX_AMOUNT, value: "1000000" }
      - { key: CONC_X402_PAY_TO, value: "000de60d3acb6caba35e66e90a62ebf2707a0e04286de203fb316179c1f2c9ed84" }
      - { key: CONC_X402_ASSET, value: "354ca0ad7ef8c97a02b195a1f39e96908fd3bf20d6ec4255850d05f1784fb404" }
      - { key: CONC_X402_ASSET_NAME, value: KaJota USD }
      - { key: CONC_X402_ASSET_DECIMALS, value: "9" }
      - { key: CONC_X402_FEE_PAYER, value: "81d557c9dcaadea97c34d79bf7b6af07aa9d760e5dd1aabf78a45fb39e072c3a" }
      - { key: CONC_X402_FACILITATOR_API_KEY, sync: false }
      - { key: CONC_CASPER_MCP_ENABLED, value: "0" }
      - { key: CONC_COACH_BACKEND_URL, sync: false }

      # ---- slack -----------------------------------------------------
      - { key: SLK_GEMINI_MODEL, value: gemini-2.5-pro }
      - { key: SLK_GCP_PROJECT_ID, sync: false }
      - { key: SLK_GCP_REGION, value: us-central1 }
      - { key: SLK_GOOGLE_APPLICATION_CREDENTIALS, value: /etc/secrets/gcp-service-account.json }
      - { key: SLK_GOOGLE_GENAI_USE_VERTEXAI, value: "true" }
      - { key: SLK_GOOGLE_CLOUD_LOCATION, value: global }
      - { key: SLK_PARTNER, value: mongodb }
      - { key: SLK_MONGODB_URI, sync: false }
      - { key: SLK_COACH_BACKEND_URL, sync: false }
      # BOTH token + signing secret are required or the Slack routes don't mount
      - { key: SLK_SLACK_BOT_TOKEN, sync: false }
      - { key: SLK_SLACK_SIGNING_SECRET, sync: false }
      - { key: SLK_MESH_CHAIN, value: mantle-sepolia }
      - { key: SLK_MESH_RELAYER_PRIVATE_KEY, sync: false }

      # ---- mesh-skill (rapid-agent, Sepolia) -------------------------
      - { key: MSKL_MESH_CHAIN_ID, value: "11155111" }
      - { key: MSKL_MESH_DRY_RUN, value: "false" }
      - { key: MSKL_MESH_RPC_URL, sync: false }
      - { key: MSKL_MESH_RELEASE_AUTH_KEY, sync: false }

      # ---- witness (unprefixed — no name collisions) -----------------
      - { key: ZG_RPC_URL, value: https://evmrpc-testnet.0g.ai }
      - { key: ZG_INDEXER_URL, value: https://indexer-storage-testnet-turbo.0g.ai }
      - { key: WITNESS_ANCHOR_ADDRESS, value: "0x2f1D3a881cfbeA01Cf55f3cAd125aA32Bf8cEC94" }
      - { key: INDEX_PATH, value: ./data/index.json }
      - { key: WITNESS_DEPLOYER_PK, sync: false }
      - { key: GROQ_API_KEY, sync: false }

      # ---- keeperhub-escrow (Kajota × KeeperHub hackathon console) ---
      # KH_API_KEY is the org-level `kh_...` key from app.keeperhub.com; it
      # is server-held and never returned to the browser. Deposit/keeper
      # addresses match what's in kajota-mesh/deployments/keeperhub.json.
      - { key: KH_API_BASE, value: https://app.keeperhub.com }
      - { key: KH_API_KEY, sync: false }
      - { key: KH_WORKFLOW_ID, value: "1pyjp0c15z2h558jld8pn" }
      - { key: KH_CONTRACT_ADDRESS, value: "0x599869cef2e4c52e2c9074caaf8f9fb0cb191776" }
      - { key: KH_KEEPER_ADDRESS, value: "0x4c629AD055B3Ad07beF13b3b2f47E74aFE493bc2" }
      - { key: KH_CHAIN_ID, value: "11155111" }
      - { key: KH_DEMO_DEPOSIT_ID, value: "0xe713d5a3eb6c0c3c247e3c86ad23696e006c6097de47d5fad9a303838f0f2d13" }
